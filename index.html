<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dice Battle</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <h1>🎲 Dice Battle</h1>

    <p class="subtitle">
      Responsive HTML CSS JavaScript Dice Game
    </p>

    <div class="players">

      <!-- Player -->
      <div class="player-box">

        <h2>You</h2>

        <div class="dice" id="playerDice">
          🎲
        </div>

        <div class="score" id="playerScore">
          0
        </div>

      </div>

      <!-- Computer -->
      <div class="player-box">

        <h2>Computer</h2>

        <div class="dice" id="computerDice">
          🎲
        </div>

        <div class="score" id="computerScore">
          0
        </div>

      </div>

    </div>

    <!-- Button -->
    <button id="rollBtn">
      Roll Dice
    </button>

    <!-- Result -->
    <div id="result">
      Start The Game
    </div>

    <div class="footer">
      Built with HTML • CSS • JavaScript
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
